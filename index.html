<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitty Pot | The Cutest Cat Mixer!</title>
    <meta name="description" content="Fusiona gatos, domina las físicas y evita que el frasco se desborde en este adictivo Suika game.">
    <style>
        :root {
            /* Paleta extraída de tus assets (tonos cálidos y madera) */
            --text-main: #4A3B32; 
            --text-light: #7A6556;
            --btn-bg: #D98C64; /* Naranja suave de los gatos */
            --btn-hover: #C57952;
            --bg-overlay: rgba(255, 252, 248, 0.85); /* Para que el texto se lea sobre el fondo */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Usamos tu arte de fondo maravillosamente cálido */
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Capa superpuesta para dar legibilidad sin perder el fondo */
        .overlay {
            flex: 1;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(4px); /* Pequeño desenfoque moderno */
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .studio-link {
            font-size: 0.9rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.5);
            padding: 5px 10px;
            border-radius: 8px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .main-logo {
            max-width: 100%;
            width: 500px; /* Tamaño generoso para lucir el logo */
            margin-bottom: 20px;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.15));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 40px;
            max-width: 600px;
            font-weight: 500;
        }

        /* Botones de Tienda */
        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .store-btn {
            background-color: var(--btn-bg);
            color: #FFF;
            padding: 15px 35px;
            border-radius: 20px; /* Bordes redondeados como tu UI */
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 8px 0px #B06A45, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }

        .store-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #B06A45, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Sección de Gameplay (Las capturas) */
        .gameplay-showcase {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .phone-mockup {
            width: 280px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 8px solid #2C2C2C;
            background-color: #000;
            overflow: hidden;
        }

        .phone-mockup img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Sección de Personajes */
        .characters-promo {
            text-align: center;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .characters-promo img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            background-color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        footer a {
            color: var(--text-main);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <header>
            <div></div> <a href="https://vetastudios.io" class="studio-link" target="_blank">By Veta Studios</a>
        </header>

        <main>
            <section class="hero">
                <img src="logo.png" alt="Kitty Pot Logo" class="main-logo">
                
                <p>¡Deja caer, fusiona y descubre nuevos felinos! Domina las físicas para alcanzar el récord sin que el frasco se desborde.</p>
                
                <div class="store-buttons">
                    <a href="#" class="store-btn">Descargar en iOS</a>
                    <a href="#" class="store-btn">Obtener en Android</a>
                </div>
            </section>

            <section class="gameplay-showcase">
                <div class="phone-mockup">
                    <img src="menu.png" alt="Menú Principal Kitty Pot">
                </div>
                <div class="phone-mockup">
                    <img src="juego.png" alt="Gameplay Kitty Pot">
                </div>
            </section>

            <section class="characters-promo">
                <img src="principal-image-2.png" alt="Todos los gatos de Kitty Pot">
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Veta Studios. Todos los derechos reservados.</p>
            <a href="https://vetastudios.io/politicas-de-privacidad" target="_blank">Políticas de Privacidad</a>
        </footer>
    </div>

</body>
</html>
